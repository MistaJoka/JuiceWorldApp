<meta charset="utf-8">
<title>JUICE SHOP // COMMAND CENTER</title>
<style>
  :root{
    --bg:#0a0e0d; --panel:#0f1512; --panel2:#131b17; --line:#1e2a23;
    --ink:#c8d6cd; --dim:#6f8478; --amber:#e8a13a; --green:#5fe08a;
    --red:#e0605f; --cyan:#4fc9d4; --violet:#b48cf0;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
  header.top{border:1px solid var(--line);background:var(--panel);padding:14px 16px;border-radius:8px;margin-bottom:14px}
  .title{color:var(--green);font-size:16px;letter-spacing:2px}
  .sub{color:var(--dim);font-size:11px;margin-top:4px}
  .barwrap{margin-top:10px;height:8px;background:#0a100c;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));width:0%;transition:width .3s}
  .stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
  .stats b{color:var(--ink)}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .tab{padding:7px 13px;border:1px solid var(--line);background:var(--panel);color:var(--dim);border-radius:6px;cursor:pointer;font-size:12px}
  .tab.on{color:var(--green);border-color:var(--green);background:var(--panel2)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
  .filters select,.filters input{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:6px 9px;border-radius:6px;font-family:var(--mono);font-size:12px}
  .chip{padding:5px 10px;border:1px solid var(--line);border-radius:14px;color:var(--dim);cursor:pointer;font-size:11px}
  .chip.on{color:var(--amber);border-color:var(--amber)}
  .cat{margin:16px 0 6px;color:var(--violet);font-size:12px;letter-spacing:1px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .card{border:1px solid var(--line);background:var(--panel);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .card.done{border-color:#26402e}
  .chead{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
  .chead:hover{background:var(--panel2)}
  .cbox{width:16px;height:16px;border:1px solid var(--dim);border-radius:4px;flex:0 0 auto;display:grid;place-items:center;font-size:11px;color:var(--green)}
  .card.done .cbox{border-color:var(--green);background:#12251a}
  .cname{flex:1;font-size:13px;min-width:120px}
  .card.done .cname{color:var(--dim);text-decoration:line-through}
  .badges{display:flex;gap:4px;flex-wrap:wrap}
  .bdg{font-size:9px;letter-spacing:.5px;padding:2px 6px;border-radius:10px;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .bdg.danger{color:var(--red);border-color:var(--red)}
  .bdg.prereq{color:var(--cyan);border-color:var(--cyan)}
  .bdg.brute{color:var(--amber);border-color:var(--amber)}
  .bdg.tut{color:var(--green);border-color:var(--green)}
  .bdg.code{color:var(--violet);border-color:var(--violet)}
  .stars{color:var(--amber);font-size:11px;letter-spacing:1px;white-space:nowrap}
  .caret{color:var(--dim);font-size:11px;transition:transform .2s}
  .card.open .caret{transform:rotate(90deg)}
  .cbody{display:none;padding:0 12px 12px;border-top:1px solid var(--line)}
  .card.open .cbody{display:block}
  .goal{margin:10px 0 4px;color:var(--ink);font-size:12px;background:var(--panel2);border-left:2px solid var(--violet);padding:8px 12px;border-radius:0 6px 6px 0}
  .goal code{background:#080c0a;border:1px solid var(--line);padding:1px 4px;border-radius:3px;color:var(--amber);font-size:11px}
  .tiers{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
  .tierbtn{padding:6px 11px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);border-radius:6px;cursor:pointer;font-size:11px}
  .tierbtn.on{color:var(--cyan);border-color:var(--cyan)}
  .tierbtn.last.on{color:var(--red);border-color:var(--red)}
  .reveal{border-left:2px solid var(--cyan);padding:8px 12px;margin:6px 0;background:var(--panel2);border-radius:0 6px 6px 0;font-size:12px;color:var(--ink);display:none}
  .reveal.show{display:block}
  .reveal code{background:#080c0a;border:1px solid var(--line);padding:1px 4px;border-radius:3px;color:var(--amber);font-size:11px}
  .booklinks{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:11px;color:var(--dim);display:none}
  .booklinks.show{display:block}
  .booklinks a{margin-right:14px}
  .booklinks a.fix{color:var(--green)}
  .notes{width:100%;margin-top:10px;background:#080c0a;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px;font-family:var(--mono);font-size:12px;resize:vertical;min-height:52px}
  .lbl{color:var(--dim);font-size:10px;letter-spacing:1px;margin:8px 0 2px}
  .doc{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:16px}
  .doc h3{color:var(--green);margin:18px 0 8px;font-size:13px;letter-spacing:1px}
  .doc h3:first-child{margin-top:0}
  .doc p{color:var(--ink);margin:6px 0}
  .doc ul{margin:6px 0;padding-left:18px}
  .doc li{margin:4px 0}
  .doc code{background:#080c0a;border:1px solid var(--line);padding:1px 5px;border-radius:4px;color:var(--amber);font-size:12px}
  .doc .step{color:var(--cyan)}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:4px 12px;margin:6px 0}
  .kv .k{color:var(--dim)}
  .warn{border:1px solid #4a3a1a;background:#1a140a;color:var(--amber);padding:10px 12px;border-radius:6px;margin:10px 0;font-size:12px}
  .foot{margin-top:20px;color:var(--dim);font-size:10px;text-align:center}
  .reset{color:var(--red);cursor:pointer;border:1px solid var(--line);padding:4px 9px;border-radius:6px;background:none;font-family:var(--mono);font-size:10px}
  .doc code{cursor:pointer;transition:background .15s,border-color .15s}
  .doc code:hover{background:#12251a;border-color:var(--green)}
  .doc code.copied{background:#12251a;border-color:var(--green);color:var(--green)}
  .chip.start{color:var(--green);border-color:var(--green)}
  .chip.start.on{background:var(--panel2)}
  .goal code,.reveal code{cursor:pointer;transition:background .15s,border-color .15s}
  .goal code:hover,.reveal code:hover{background:#12251a;border-color:var(--green)}
  .goal code.copied,.reveal code.copied{background:#12251a;border-color:var(--green);color:var(--green)}
  .acc{margin-bottom:4px}
  .acc-h{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .acc-h h3{margin:14px 0 8px}
  .acc:first-child .acc-h h3{margin-top:0}
  .acc-h .tg{color:var(--dim);font-size:10px;transition:transform .2s;margin-top:6px}
  .acc.closed .tg{transform:rotate(-90deg)}
  .acc.closed .acc-body{display:none}
  .hint-inline{color:var(--dim);font-size:10px;margin-left:auto;margin-top:6px}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--green);color:var(--green);padding:8px 14px;border-radius:6px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:50;font-family:var(--mono)}
  #toast.show{opacity:1}
  .hidden{display:none!important}
</style>

<script>
const BOOK_HINTS="https://pwning.owasp-juice.shop";
const BOOK_PART2="https://pwning.owasp-juice.shop/companion-guide/latest/part2/README.html";
const BOOK_SOLUTIONS="https://help.owasp-juice.shop/appendix/solutions.html";

const CH=[{"n":"Chatbot Prompt Injection","c":"Injection","d":2,"g":"Trick the chatbot into generating a coupon code for you despite its coupon policy saying otherwise.","t":["Good for Demos","AI/LLM"],"h":["The chatbot has a tool for generating coupons, but is instructed to only use it under very specific conditions.","Try to convince the chatbot that the conditions for coupon generation are met, even if they are not.","Prompt injection techniques can help you bypass the chatbot's restrictions on tool usage."],"m":"https://genai.owasp.org/llmrisk/llm01-prompt-injection/","x":false},{"n":"Login Admin","c":"Injection","d":2,"g":"Log in with the administrator's user account.","t":["Tutorial","Good for Demos"],"h":["The challenge description probably gave away what form you should attack.","If you happen to know the email address of the admin already, you can launch a targeted attack.","You might be lucky with a dedicated attack pattern even if you have no clue about the admin email address.","If you harvested the admin’s password hash, you can of course try to attack that instead of using SQL Injection.","Alternatively you can solve this challenge as a combo with the Log in with the administrator’s user credentials without previously changing them or applying SQL Injection challenge."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"Database Schema","c":"Injection","d":3,"g":"Exfiltrate the entire DB schema definition via SQL Injection.","t":[],"h":["Find out where this information could come from. Then craft an attack string against an endpoint that offers an unnecessary way to filter data.","Find out which database system is in use and where it would usually store its schema definitions.","Craft a UNION SELECT attack string to join the relevant data from any such identified system table into the original result.","You might have to tackle some query syntax issues step-by-step, basically hopping from one error to the next.","As with \"Order the Christmas special offer of 2014\" this cannot be achieved through the application frontend."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"Greedy Chatbot Manipulation","c":"Injection","d":3,"g":"Convince the chatbot to give you a coupon of 50% or more. Because apparently a 10% max policy is just a suggestion when you ask nicely enough.","t":["AI/LLM"],"h":["The chatbot's system prompt says the maximum discount is 10%. But system prompts are more like guidelines than actual rules, right?","You already know how to make the chatbot generate a coupon. Now make it go way beyond the allowed maximum.","The chatbot trusts whatever discount value it decides to pass to its tool. Make it decide on a very generous number."],"m":"https://genai.owasp.org/llmrisk/llm01-prompt-injection/","x":false},{"n":"Login Bender","c":"Injection","d":3,"g":"Log in with Bender's user account.","t":["Tutorial"],"h":["The challenge description probably gave away what form you should attack.","You need to know (or smart-guess) Bender’s email address so you can launch a targeted attack.","Bender's password hash might not help you very much.","In case you try some other approach than SQL Injection, you will notice that Bender’s password hash is not very useful."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"Login Jim","c":"Injection","d":3,"g":"Log in with Jim's user account.","t":["Tutorial"],"h":["The challenge description probably gave away what form you should attack.","You need to know (or smart-guess) Jim’s email address so you can launch a targeted attack.","If you harvested Jim’s password hash, you can try to attack that instead of using SQL Injection."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"System Prompt Extraction","c":"Injection","d":3,"g":"Extract the chatbot's system prompt using prompt injection, then submit your findings (including any confidential sections) via the <a href=\"/#/complain\">Customer Complaint form<\/a>.","t":["AI/LLM"],"h":["The chatbot has a system prompt with both public and confidential instructions. Try to make it reveal its full configuration using prompt injection.","There are internal rules beyond the standard coupon policy. Think about edge cases - what happens in unusual customer situations?","The similarity check is lenient - you do not need to reproduce the system prompt word for word. Focus on capturing the confidential sections accurately."],"m":"https://genai.owasp.org/llmrisk/llm072025-system-prompt-leakage/","x":false},{"n":"Christmas Special","c":"Injection","d":4,"g":"Order the Christmas special offer of 2014.","t":[],"h":["Find out how the application handles unavailable products and try to find a loophole.","Find out how the application hides deleted products from its customers.","Try to craft an attack string that makes deleted products visible again.","You need to get the deleted product into your shopping cart and trigger the Checkout.","Neither of the above can be achieved through the application frontend and it might even require (half-)Blind SQL Injection."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"Ephemeral Accountant","c":"Injection","d":4,"g":"Log in with the (non-existing) accountant <i>acc0unt4nt@juice-sh.op<\/i> without ever registering that user.","t":[],"h":["Try to create the needed user \"out of thin air\".","The user literally needs to be ephemeral as in \"lasting for only a short time\".","Registering normally with the user’s email address will then obviously not solve this challenge. The Juice Shop will not even let you register as acc0unt4nt@juice-sh.op, as this would make the challenge unsolvable for you.","Getting the user into the database some other way will also fail to solve this challenge. In case you somehow managed to do so, you need to restart the Juice Shop application in order to wipe the database and make the challenge solvable again.","The fact that this challenge is in the Injection category should already give away the intended approach."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"NoSQL DoS","c":"Injection","d":4,"g":"Let the server sleep for some time. (It has done more than enough hard work for you)","t":["Danger Zone"],"h":["This challenge is essentially a stripped-down Denial of Service (DoS) attack.","As stated in the Architecture overview, OWASP Juice Shop uses a MongoDB derivate as its NoSQL database.","The categorization into the NoSQL Injection category totally gives away the expected attack vector for this challenge. Trying any others will not solve the challenge, even if they might yield the same result.","In particular, flooding the application with requests will not solve this challenge. That would probably just kill your server instance."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html","x":true},{"n":"NoSQL Manipulation","c":"Injection","d":4,"g":"Update multiple product reviews at the same time.","t":[],"h":["Take a close look on how the equivalent of UPDATE-statements in MongoDB work.","This challenge requires another classic Injection attack.","It is also worth looking into how Query Operators work in MongoDB."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"User Credentials","c":"Injection","d":4,"g":"Retrieve a list of all user credentials via SQL Injection.","t":[],"h":["Gather information on where user data is stored and how it is addressed. Then craft a corresponding UNION SELECT attack.","Try to find an endpoint where you can influence data being retrieved from the server.","Craft a UNION SELECT attack string to join data from another table into the original result.","You might have to tackle some query syntax issues step-by-step, basically hopping from one error to the next","As with \"Order the Christmas special offer of 2014\" and \"Exfiltrate the entire DB schema definition via SQL Injection\" this cannot be achieved through the application frontend."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html","x":false},{"n":"NoSQL Exfiltration","c":"Injection","d":5,"g":"All your orders are belong to us! Even the ones which don't.","t":["Danger Zone"],"h":["Take a close look on how the $where query operator works in MongoDB.","This challenge requires a classic Injection attack.","Find an API endpoint with the intent of delivering a single order to the user and work with that.","Reading up on how MongoDB queries work is really helpful here."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Injection_Prevention_Cheat_Sheet.html","x":true},{"n":"SSTi","c":"Injection","d":6,"g":"Infect the server with juicy malware by abusing arbitrary command execution.","t":["Contraption","Danger Zone","Code Analysis"],"h":["\"SSTi\" is a clear indicator that this has nothing to do with anything Angular. Also, make sure to use only our non-malicious malware.","You can find the juicy malware via a very obvious Google search or by stumbling into a very ill-placed quarantine folder with the necessary URLs in it.","Making the server download and execute the malware is key to solving this challenge.","For this challenge you do not have to reverse engineer the malware in any way. That will be required later to solve the \"Request a hidden resource on server through server\" challenge."],"m":"","x":true},{"n":"Password Strength","c":"Broken Authentication","d":2,"g":"Log in with the administrator's user credentials without previously changing them or applying SQL Injection.","t":["Brute Force","Tutorial"],"h":["This challenge can be solved with three different approaches.","Guessing might work just fine.","If you harvested the admin’s password hash, you can try to attack that.","In case you use some hacker tool, you can also go for a brute force attack using a generic password list."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html","x":false},{"n":"Bjoern's Favorite Pet","c":"Broken Authentication","d":3,"g":"Reset the password of Bjoern's OWASP account via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism with <i>the original answer<\/i> to his security question.","t":["OSINT"],"h":["Hints to the answer to Bjoern’s question can be found by looking him up on the Internet.","More precisely, Bjoern might have accidentally (?) doxxed himself by mentioning his security answer on at least one occasion where a camera was running.","Brute forcing the answer might be very well possible with a sufficiently extensive list of common pet names."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"GDPR Data Erasure","c":"Broken Authentication","d":3,"g":"Log in with Chris' erased user account.","t":[],"h":["Turns out that something is technically and legally wrong with the implementation of the \"right to be forgotten\" for users.","Trying out the Request Data Erasure functionality might be interesting, but cannot help you solve this challenge in real time.","If you have solved the challenge Retrieve a list of all user credentials via SQL Injection you might have already retrieved some information about how the Juice Shop \"deletes\" users upon their request.","What the Juice Shop does here is totally incompliant with GDPR. Luckily a 4% fine on a gross income of 0$ is still 0$."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/User_Privacy_Protection_Cheat_Sheet.html","x":false},{"n":"Reset Jim's Password","c":"Broken Authentication","d":3,"g":"Reset Jim's password via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism with <i>the original answer<\/i> to his security question.","t":["OSINT"],"h":["The hardest part of this challenge is actually to find out who Jim actually is.","Jim picked one of the worst security questions and chose to answer it truthfully.","As Jim is a celebrity, the answer to his question is quite easy to find in publicly available information on the internet.","Even brute forcing the answer should be possible with the right kind of word list."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"Login Bjoern","c":"Broken Authentication","d":4,"g":"Log in with Bjoern's Gmail account <i>without<\/i> previously changing his password, applying SQL Injection, or hacking his Google account.","t":["Code Analysis"],"h":["The security flaw behind this challenge is 100% OWASP Juice Shop's fault and 0% Google's.","One way to light up this challenge in green on the score board, is to be Bjoern Kimminich. In that case, just log in with your Google account to automatically solve this challenge! Congratulations!","Most likely you are not Bjoern Kimminich, so instead you might want to take detailed look into how the OAuth login with Google is implemented.","It could bring you some insight to register with your own Google account and analyze closely what happens behind the scenes."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html","x":false},{"n":"Reset Bender's Password","c":"Broken Authentication","d":4,"g":"Reset Bender's password via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism with <i>the original answer<\/i> to his security question.","t":["OSINT"],"h":["If you have no idea who Bender is, please put down this book right now and watch the first episodes of Futurama before you come back.","Unexpectedly, Bender also chose to answer his chosen question truthfully.","Hints to the answer to Bender’s question can be found in publicly available information on the Internet.","If a seemingly correct answer is not accepted, you might just need to try some alternative spelling.","Brute forcing the answer should be next to impossible."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"Change Bender's Password","c":"Broken Authentication","d":5,"g":"Change Bender's password into <i>slurmCl4ssic<\/i> without using SQL Injection or Forgot Password.","t":[],"h":["In previous releases this challenge was wrongly accused of being based on CSRF.","It might also have been put into the Improper Input Validation category.","Bender’s current password is so strong that brute force, rainbow table or guessing attacks will probably not work."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html","x":false},{"n":"Reset Bjoern's Password","c":"Broken Authentication","d":5,"g":"Reset the password of Bjoern's internal account via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism with <i>the original answer<\/i> to his security question.","t":["OSINT"],"h":["Nothing a little bit of Facebook stalking couldn't reveal. Might involve a historical twist.","Other than with his OWASP account, Bjoern was a bit less careless with his choice of security and answer to his internal account.","Bjoern chose to answer his chosen question truthfully but tried to make it harder for attackers by applying sort of a historical twist.","Again, hints to the answer to Bjoern’s question can be found by looking him up on the Internet.","Brute forcing the answer should be next to impossible."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"Two Factor Authentication","c":"Broken Authentication","d":5,"g":"Solve the 2FA challenge for user \"wurstbrot\". (Disabling, bypassing or overwriting his 2FA settings does not count as a solution)","t":[],"h":["The 2FA implementation requires to store a secret for every user. You will need to find a way to access this secret in order to solve this challenge.","As always, first learn how the feature under attack is used and behaves under normal conditions.","Make sure you understand how 2FA with TOTP (time-based one-time password) works and which part of it is the critically sensitive one.","Solving the challenge \"Retrieve a list of all user credentials via SQL Injection\" before tackling this one will definitely help. But it will not carry you all the way."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Multifactor_Authentication_Cheat_Sheet.html","x":false},{"n":"Web3 Sandbox","c":"Broken Access Control","d":1,"g":"Find an accidentally deployed code sandbox for writing smart contracts on the fly.","t":["Web3"],"h":["It is just as easy as finding the Score Board."],"m":"","x":false},{"n":"AI Debugging","c":"Broken Access Control","d":2,"g":"Reveal some behind-the-scenes information on the chatbot as a non-admin user.","t":["AI/LLM"],"h":["The chatbot has a debugging feature that shows how it interacts with its tools. It is only supposed to be visible for admins.","Access control for the debugging feature is only implemented on the client-side.","Find the cookie that controls the visibility of tool calls and set it to <code>true<\/code>.","If you see the tool calls but the challenge is not marked as solved, you might be still logged in as a user with admin privileges."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Broken_Access_Control_Cheat_Sheet.html","x":false},{"n":"Admin Section","c":"Broken Access Control","d":2,"g":"Access the administration section of the store.","t":["Good for Demos"],"h":["It is just slightly harder to find than the score board link.","Knowing it exists, you can simply guess what URL the admin section might have.","Alternatively, you can try to find a reference or clue within the parts of the application that are not usually visible in the browser.","It is probably just slightly harder to find and gain access to than the score board link.","There is some access control in place, but there are at least three ways to bypass it."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"Five-Star Feedback","c":"Broken Access Control","d":2,"g":"Get rid of all 5-star customer feedback.","t":[],"h":["Once you found admin section of the application, this challenge is almost trivial.","Nothing happens when you try to delete feedback entries? Check the JavaScript console for errors!"],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"View Basket","c":"Broken Access Control","d":2,"g":"View another user's shopping basket.","t":["Tutorial","Good for Demos"],"h":["Try out all existing functionality involving the shopping basket while having an eye on the HTTP traffic.","There might be a client-side association of user to basket that you can try to manipulate.","In case you manage to update the database via SQL Injection so that a user is linked to another shopping basket, the application will not notice this challenge as solved."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"CSRF","c":"Broken Access Control","d":3,"g":"Change the name of a user by performing Cross-Site Request Forgery from <a href=\"http://htmledit.squarefree.com\">another origin<\/a>.","t":[],"h":["Find a form which updates the username and then construct a malicious page on the mentioned \"another origin\".","Take a look at what happens when you change the username within the profile page.","Search for information about CSRF attacks and look out for examples that can be applied to this challenge.","If \"another origin\" is cross-site, you probably need an older browser version for this challenge. If it is cross-domain, you should be able to make it work in a modern browser."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html","x":false},{"n":"Forged Feedback","c":"Broken Access Control","d":3,"g":"Post some feedback in another user's name.","t":["Tutorial"],"h":["You can solve this by tampering with the user interface or by intercepting the communication with the RESTful backend.","To find the client-side leverage point, closely analyze the HTML form used for feedback submission.","The backend-side leverage point is similar to some of the XSS challenges found in OWASP Juice Shop."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"Forged Review","c":"Broken Access Control","d":3,"g":"Post a product review as another user or edit any user's existing review.","t":[],"h":["Observe the flow of product review posting and editing and see if you can exploit it.","This challenge can be solved by using developers tool of your browser or with tools like postman.","Analyze the form used for review submission and try to find a leverage point.","This challenge is pretty similar to \"Post some feedback in another user’s name\" challenge."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"Manipulate Basket","c":"Broken Access Control","d":3,"g":"Put an additional product into another user's shopping basket.","t":[],"h":["Have an eye on the HTTP traffic while placing products in the shopping basket.","Adding more instances of the same product to someone else’s basket does not qualify as a solution. The same goes for stealing from someone else’s basket.","This challenge requires a bit more sophisticated tampering than others of the same ilk."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authorization_Cheat_Sheet.html","x":false},{"n":"Product Tampering","c":"Broken Access Control","d":3,"g":"Change the <code>href<\/code> of the link within the <a href=\"/#/search?q=OWASP SSL Advanced Forensic Tool (O-Saft)\">OWASP SSL Advanced Forensic Tool (O-Saft)<\/a> product description into <i>https://owasp.slack.com<\/i>.","t":[],"h":["Theoretically there are three possible ways to beat this challenge: a) broken admin functionality, b) holes in RESTful API or c) possibility for SQL Injection.","In practice two of these three ways should turn out to be dead ends."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html","x":false},{"n":"Easter Egg","c":"Broken Access Control","d":4,"g":"Find the hidden <a href=\"https://en.wikipedia.org/wiki/Easter_egg_(media)\" target=\"_blank\">easter egg<\/a>.","t":["Shenanigans","Contraption","Good for Demos"],"h":["If you solved one of the four file access challenges, you already know where to find the easter egg.","Simply reuse the trick that already worked for the files above."],"m":"","x":false},{"n":"SSRF","c":"Broken Access Control","d":6,"g":"Request a hidden resource on server through server.","t":["Code Analysis"],"h":["Reverse engineering something bad can make good things happen.","Using whatever you find inside the malware directly will not do you any good.","For this to count as an SSRF attack you need to make the Juice Shop server attack itself.","Do not try to find the source code for the malware on GitHub. Take it apart with classic reverse-engineering techniques instead."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html","x":false},{"n":"Confidential Document","c":"Sensitive Data Exposure","d":1,"g":"Access a confidential document.","t":["Good for Demos"],"h":["Analyze and tamper with links in the application that deliver a file directly.","The file you are looking for is not protected in any way. Once you found it you can also access it."],"m":"","x":false},{"n":"Exposed Credentials","c":"Sensitive Data Exposure","d":2,"g":"A developer was careless with hardcoding unused, but still valid credentials for a testing account on the client-side.","t":[],"h":["Have a look at the client-side code in the dev console."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html","x":false},{"n":"Login MC SafeSearch","c":"Sensitive Data Exposure","d":2,"g":"Log in with MC SafeSearch's original user credentials without applying SQL Injection or any other bypass.","t":["Shenanigans","OSINT"],"h":["MC SafeSearch is a rapper who produced the song \"Protect Ya' Passwordz\" which explains password & sensitive data protection very nicely.","After watching the music video of this song, you should agree that even ⭐⭐ is a slightly exaggerated difficulty rating for this challenge."],"m":"","x":false},{"n":"Meta Geo Stalking","c":"Sensitive Data Exposure","d":2,"g":"Determine the answer to John's security question by looking at an upload of him to the Photo Wall and use it to reset his password via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism.","t":["OSINT"],"h":["Take a look at the meta data of the corresponding photo.","Make use of tools that can inspect the metadata of images.","Use this information to answer the security question of the John, who enjoys hiking in the park."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"NFT Takeover","c":"Sensitive Data Exposure","d":2,"g":"Take over the wallet containing our official Soul Bound Token (NFT).","t":["Contraption","Good for Demos","Web3"],"h":["Find the seed phrase posted accidentally."],"m":"","x":false},{"n":"Password Hash Leak","c":"Sensitive Data Exposure","d":2,"g":"Obtain the password (hash) of the currently logged-in user directly from a REST API endpoint.","t":[],"h":["You need to understand what happens \"behind the scenes\", so make sure to use your DevTools or a proxy to inspect network traffic.","Look for an API endpoint that already returns some user information.","An overly generic solution for data retrieval can backfire if not properly safeguarded."],"m":"https://owasp.org/API-Security/editions/2019/en/0xa3-excessive-data-exposure","x":false},{"n":"Visual Geo Stalking","c":"Sensitive Data Exposure","d":2,"g":"Determine the answer to Emma's security question by looking at an upload of her to the Photo Wall and use it to reset her password via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism.","t":["OSINT"],"h":["Take a look at the details in the photo to determine the location of where it was taken."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"Login Amy","c":"Sensitive Data Exposure","d":3,"g":"Log in with Amy's original user credentials. (This could take 93.83 billion trillion trillion centuries to brute force, but luckily she did not read the \"One Important Final Note\")","t":["OSINT"],"h":["This challenge will make you go after a needle in a haystack.","As with so many other characters from Futurama this challenge is of course about logging in as Amy from that show.","Did you know that Amy is married to an alien named Kif?","The challenge description contains a few sentences which give away some information how Amy decided to strengthen her password.","Obviously, Amy - being a little dimwitted - did not put nearly enough effort and creativity into the password selection process."],"m":"","x":false},{"n":"Forgotten Developer Backup","c":"Sensitive Data Exposure","d":4,"g":"Access a developer's forgotten backup file.","t":["Contraption","Good for Demos","Prerequisite"],"h":["You need to trick a security mechanism into thinking that the file you want has a valid file type.","Analyze and tamper with links in the application that deliver a file directly.","The file is not directly accessible because a security mechanism prevents access to it.","You need to trick the security mechanism into thinking that the file has a valid file type.","For this challenge there is only one approach to pull this trick."],"m":"","x":false},{"n":"Forgotten Sales Backup","c":"Sensitive Data Exposure","d":4,"g":"Access a salesman's forgotten backup file.","t":["Contraption"],"h":["You need to trick a security mechanism into thinking that the file you want has a valid file type.","Analyze and tamper with links in the application that deliver a file directly.","The file is not directly accessible because a security mechanism prevents access to it.","You need to trick the security mechanism into thinking that the file has a valid file type."],"m":"","x":false},{"n":"GDPR Data Theft","c":"Sensitive Data Exposure","d":4,"g":"Steal someone else's personal data without using Injection.","t":[],"h":["Trick the regular Data Export to give you more than actually belongs to you.","You should not try to steal data from a \"vanilla\" user who never even ordered something at the shop.","As everything about this data export functionality happens on the server-side, it won’t be possible to just tamper with some HTTP requests to solve this challenge.","Inspecting various server responses which contain user-specific data might give you a clue about the mistake the developers made."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/User_Privacy_Protection_Cheat_Sheet.html","x":false},{"n":"Leaked Unsafe Product","c":"Sensitive Data Exposure","d":4,"g":"Identify an unsafe product that was removed from the shop and <a href=\"/#/contact\">inform the shop<\/a> which ingredients are dangerous.","t":["Shenanigans","OSINT"],"h":["Your own SQLi and someone else's Ctrl-V will be your accomplices in this challenge!","You must first identify the \"unsafe product\" which ist not available any more in the shop.","Solving the \"Order the Christmas special offer of 2014\" challenge might give it to you as by-catch.","The actual data you need to solve this challenge was leaked on the same platform that was involved in the \"Dumpster dive the Internet for a leaked password and log in to the original user account it belongs to\" challenge.","Google is a particularly good accomplice in this challenge."],"m":"","x":false},{"n":"Reset Uvogin's Password","c":"Sensitive Data Exposure","d":4,"g":"Reset Uvogin's password via the <a href=\"/#/forgot-password\">Forgot Password<\/a> mechanism with <i>the original answer<\/i> to his security question.","t":["OSINT"],"h":["You might have to do some OSINT on his social media personas to find out his honest answer to the security question.","People often reuse aliases online. You might be able to find something by looking online for Uvogin’s name or slight variations of it based on his unique writing habits.","You might be able to find some existing OSINT tools to help you in this investigation."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Choosing_and_Using_Security_Questions_Cheat_Sheet.html","x":false},{"n":"Email Leak","c":"Sensitive Data Exposure","d":5,"g":"Perform an unwanted information disclosure by accessing data cross-domain.","t":[],"h":["Try to find and attack an endpoint that responds with user information. SQL Injection is not the solution here.","What ways are there to access data from a web application cross-domain?","This challenge uses an old way which is no longer recommended."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/XS_Leaks_Cheat_Sheet.html","x":false},{"n":"Leaked API Key","c":"Sensitive Data Exposure","d":5,"g":"<a href=\"/#/contact\">Inform the shop<\/a> about a leaked API key. (Mention the exact key in your comment)","t":[],"h":["The API call is part of a scheduled process \"behind the scenes\", i.e. completely unrelated to the web application.","Check the Juice Shop’s social media channels for regularly scheduled content being posted, possibly even indicating that it was automatically created.","Find out which part of the content might come from the response of an API call.","Find the place where the API call happens — as stated above, it is not in the web application — and then look for the API key itself."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html","x":false},{"n":"Retrieve Blueprint","c":"Sensitive Data Exposure","d":5,"g":"Deprive the shop of earnings by downloading the blueprint for one of its products.","t":[],"h":["Check for products which seem like a natural fit for being based on a blueprint.","You might want to pay attention to the images of the identified product candidates.","For your inconvenience the blueprint was not misplaced into the same place like so many others forgotten files covered in this chapter."],"m":"","x":false},{"n":"Bonus Payload","c":"XSS","d":1,"g":"Use the bonus payload <code>&lt;iframe width=&quot;100%&quot; height=&quot;166&quot; scrolling=&quot;no&quot; frameborder=&quot;no&quot; allow=&quot;autoplay&quot; src=&quot;https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/771984076&amp;color=%23ff5500&amp;auto_play=true&amp;hide_related=false&amp;show_comments=true&amp;show_user=true&amp;show_reposts=false&amp;show_teaser=true&quot;&gt;&lt;/iframe&gt;<\/code> in the <i>DOM XSS<\/i> challenge.","t":["Shenanigans","Tutorial"],"h":["First, solve the \"Perform a DOM XSS attack\" challenge.","Now it is just a question of copying and pasting the payload into the same vulnerable field.","Crank up the volume of your computer before submitting the payload! 🔊"],"m":"https://cheatsheetseries.owasp.org/cheatsheets/DOM_based_XSS_Prevention_Cheat_Sheet.html","x":false},{"n":"DOM XSS","c":"XSS","d":1,"g":"Perform a <i>DOM<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code>.","t":["Tutorial","Good for Demos"],"h":["Look for an input field where its content appears in the HTML when its form is submitted.","This challenge is almost indistinguishable from \"Perform a reflected XSS attack\" if you do not look \"under the hood\" to find out what the application actually does with the user input."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/DOM_based_XSS_Prevention_Cheat_Sheet.html","x":false},{"n":"Reflected XSS","c":"XSS","d":2,"g":"Perform a <i>reflected<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code>.","t":["Tutorial","Danger Zone","Good for Demos"],"h":["Look for a url parameter where its value appears in the page it is leading to.","Try probing for XSS vulnerabilities by submitting text wrapped in an HTML tag which is easy to spot on screen, e.g. <h1> or <strike>."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"API-only XSS","c":"XSS","d":3,"g":"Perform a <i>persisted<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code> without using the frontend application at all.","t":["Danger Zone"],"h":["You need to work with the server-side API directly. Try different HTTP verbs on different entities exposed through the API.","A matrix of known data entities and their supported HTTP verbs through the API can help you here.","Careless developers might have exposed API methods that the client does not even need."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"Client-side XSS Protection","c":"XSS","d":3,"g":"Perform a <i>persisted<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code> bypassing a <i>client-side<\/i> security mechanism.","t":["Danger Zone"],"h":["There are only some input fields in the Juice Shop forms that validate their input.","Even less of these fields are persisted in a way where their content is shown on another screen.","Bypassing client-side security can typically be done by either disabling it on the client (i.e. in the browser by manipulating the DOM tree) or by ignoring it completely and interacting with the backend instead."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"CSP Bypass","c":"XSS","d":4,"g":"Bypass the Content Security Policy and perform an XSS attack with <code>&lt;script&gt;alert(`xss`)&lt;/script&gt;<\/code> on a legacy page within the application.","t":["Danger Zone"],"h":["What is even \"better\" than a legacy page with a homegrown RegEx sanitizer? Having CSP injection issues on the exact same page as well!","Find a screen in the application that looks subtly odd and dated compared with all other screens.","Before trying any XSS attacks, you should understand how the page is setting its Content Security Policy.","For the subsequent XSS, make good use of the flaws in the homegrown sanitization based on a RegEx!"],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"HTTP-Header XSS","c":"XSS","d":4,"g":"Perform a <i>persisted<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code> through an HTTP header.","t":["Danger Zone"],"h":["Finding a piece of displayed information that could originate from an HTTP header is part of this challenge.","You might have to look into less common or even proprietary HTTP headers to find the leverage point.","Adding insult to injury, the HTTP header you need will never be sent by the application on its own."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"Server-side XSS Protection","c":"XSS","d":4,"g":"Perform a <i>persisted<\/i> XSS attack with <code>&lt;iframe src=\"javascript:alert(`xss`)\"&gt;<\/code> bypassing a <i>server-side<\/i> security mechanism.","t":["Danger Zone"],"h":["The \"Comment\" field in the \"Customer Feedback\" screen is where you want to put your focus on.","The Comment field in the Contact Us screen is where you want to put your focus on.","The attack payload <iframe src=\"javascript:alert(`xss)\">` will not be rejected by any validator but stripped from the comment before persisting it.","Look for possible dependencies related to input processing in the package.json.bak you harvested earlier.","If an XSS alert shows up but the challenge does not appear as solved on the Score Board, you might not have managed to put the exact attack string <iframe src=\"javascript:alert(`xss)\">` into the database?"],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"Video XSS","c":"XSS","d":6,"g":"Embed an XSS payload <code>&lt;/script&gt;&lt;script&gt;alert(`xss`)&lt;/script&gt;<\/code> into our promo video.","t":["Danger Zone"],"h":["Without utilizing the vulnerability behind another ⭐⭐⭐⭐⭐⭐ challenge it is not possible to plant the XSS payload for this challenge.","The mentioned \"marketing collateral\" might have been publicly advertised by the Juice Shop but is not necessarily part of its sitemap yet.","It might help to perform some online searches for structurally similar web projects once you get stuck.","This challenge will always partially keep you blindfolded, no matter how hard you do research and analysis."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","x":true},{"n":"XXE Data Access","c":"XXE","d":3,"g":"Retrieve the content of <code>C:\\Windows\\system.ini<\/code> or <code>/etc/passwd<\/code> from the server.","t":["Danger Zone"],"h":["The leverage point for this challenge is the deprecated B2B interface.","This challenge sounds a lot harder than it actually is, which amplifies how bad the underlying vulnerability is.","Doing some research on typical XEE attack patterns basically gives away the solution for free."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html","x":true},{"n":"XXE DoS","c":"XXE","d":5,"g":"Give the server something to chew on for quite a while.","t":["Danger Zone"],"h":["It is not as easy as sending a large amount of data directly to the deprecated B2B interface.","The leverage point for this is obviously the same as for the XXE Data Access challenge.","You can only solve this challenge by keeping the server busy for >2sec with your attack.","The effectiveness of attack payloads for this challenge might depend on the operating system the Juice Shop is running on."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/XML_External_Entity_Prevention_Cheat_Sheet.html","x":true},{"n":"Weird Crypto","c":"Cryptographic Issues","d":2,"g":"<a href=\"/#/contact\">Inform the shop<\/a> about an algorithm or library it should definitely not use the way it does.","t":[],"h":["Report one of five possible answers via the \"Customer Feedback\" form.","Cryptographic functions only used in the \"Apply some advanced cryptanalysis to find the real easter egg\" challenge do not count as they are only a developer’s prank and not a serious security problem."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Vulnerability_Disclosure_Cheat_Sheet.html","x":false},{"n":"Nested Easter Egg","c":"Cryptographic Issues","d":4,"g":"Apply some advanced cryptanalysis to find <i>the real<\/i> easter egg.","t":["Shenanigans","Good for Demos"],"h":["You might have to peel through several layers of tough-as-nails encryption for this challenge.","Make sure you solve Find the hidden easter egg first.","You might have to peel through several layers of tough-as-nails encryption for this challenge."],"m":"","x":false},{"n":"Forged Coupon","c":"Cryptographic Issues","d":6,"g":"Forge a coupon code that gives you a discount of at least 80%.","t":["Good for Demos","Code Analysis"],"h":["Try either a) a knowledgeable brute force attack or b) reverse engineering or c) some research in the cloud.","One viable solution would be to reverse-engineer how coupon codes are generated and craft your own 80% coupon by using the same (or at least similar) implementation.","Another possible solution might be harvesting as many previous coupon as possible and look for patterns that might agement_Cheat_Sheet.html","x":false},{"n":"Blocked RCE DoS","c":"Insecure Deserialization","d":5,"g":"Perform a Remote Code Execution that would keep a less hardened application busy <em>forever<\/em>.","t":["Danger Zone"],"h":["The feature you need to exploit for this challenge is not directly advertised anywhere.","As the Juice Shop is written in pure Javascript, there is one data format that is most probably used for serialization.","You should try to make the server busy for all eternity.","The challenge will be solved if you manage to trigger the protection of the application against a very specific DoS attack vector.","Similar to the \"Let the server sleep for some time\" challenge (which accepted nothing but NoSQL Injection as a solution) this challenge will only accept proper RCE as a solution. It cannot be solved by simply hammering the server with requests. That would probably just kill your server instance."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html","x":true},{"n":"Memory Bomb","c":"Insecure Deserialization","d":5,"g":"Drop some explosive data into a vulnerable file-handling endpoint.","t":["Danger Zone"],"h":["This one is actually similar to the XXE DoS challenge in every way except the data format being (ab)used.","You can only solve this challenge by keeping the server busy for >2sec with your attack.","The effectiveness of attack payloads for this challenge might depend on the operating system the Juice Shop is running on."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html","x":true},{"n":"Successful RCE DoS","c":"Insecure Deserialization","d":6,"g":"Perform a Remote Code Execution that occupies the server for a while without using infinite loops.","t":["Danger Zone"],"h":["Your attack payload must not trigger the protection against too many iterations and infinite loops.","This challenge uses the same leverage point as the \"Perform a Remote Code Execution that would t":["Prerequisite"],"h":["Try to submit bad input to forms. Alternatively tamper with URL paths or parameters.","This challenge actually triggers from various possible error conditions.","You can try to submit bad input to forms to provoke an improper error handling.","Tampering with URL paths or parameters might also trigger an unforeseen error."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html","x":false},{"n":"Deprecated Interface","c":"Security Misconfiguration","d":2,"g":"Use a deprecated B2B interface that was not properly shut down.","t":["Contraption","Prerequisite"],"h":["The developers who disabled the interface think they could go invisible by just closing their eyes.","The old B2B interface was replaced with a more modern version recently.","When deprecating the old interface, not all of its parts were cleanly removed from the code base.","Simply using the deprecated interface suffices to solve this challenge. No attack or exploit is necessary."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Web_Service_Security_Cheat_Sheet.html","x":false},{"n":"Cross-Site Imaging","c":"Security Misconfiguration","d":5,"g":"Stick <a href=\"https://cataas.com/cat\" target=\"_blank\">cute cross-domain kittens<\/a> all over our delivery boxes.","t":["Contraption"],"h":["This challenge would formally have to be in several categories as the developers made multiple gaffes for this to be possible.","Loading this page with an empty browser cache and on a slow (or throttled) connection will give you an idea on what the delivery box image is made of. Of course inspecting the page source will tell you just as much.","You need to dive deep into the actual Angular code to understand this one.","This challenge requires the exploitation of another vulnerability which even has its own two challenges in its very own category","This challenge can only be solved by strictly using the mentioned \"cross-domain kittens\". No other kittens from anywhere else can solve this challenge."],"m":"","x":false},{"n":"Login Support Team","c":"Security Misconfiguration","d":6,"g":"Log in with the support team's original user credentials without applying SQL Injection or any other bypass.","t":["Brute Force","Code Analysis"],"h":["The underlying flaw of this challenge is a lot more human error than technical weakness.","The support team is located in a low-cost country and the team structure fluctuates a lot due to people leaving for jobs with even just slightly better wages.","To prevent abuse the password for the support team account itself is actually very strong.","To allow easy access during an incident, the support team utilizes a 3rd party tool which every support engineer can access to get the current account password from.","While it is also possible to use SQL Injection to log in as the support team, this will not solve the challenge."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html","x":false},{"n":"Missing Encoding","c":"Improper Input Validation","d":1,"g":"Retrieve the photo of Bjoern's cat in \"melee combat-mode\".","t":["Shenanigans"],"h":["Check the Photo Wall for an image that could not be loaded correctly.","You just have to (literally) inspect the problem to understand the basic issue.","It can also help to try out the Tweet-button of the entry and observe what happens."],"m":"","x":false},{"n":"Repetitive Registration","c":"Improper Input Validation","d":1,"g":"Follow the DRY principle while registering a user.","t":[],"h":["You can solve this by cleverly interacting with the UI or bypassing it altogether.","The obvious repetition in the User Registration form is the Repeat Password field.","Try to register with either an empty or different value in Repeat Password.","You can solve this challenge by cleverly interacting with the UI or bypassing it altogether."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html","x":false},{"n":"Zero Stars","c":"Improper Input Validation","d":1,"g":"Give a devastating zero-star feedback to the store.","t":[],"h":["Before you invest time bypassing the API, you might want to play around with the UI a bit."],"m":"","x":false},{"n":"Empty User Registration","c":"Improper Input Validation","d":2,"g":"Register a user with an empty email and password.","t":[],"h":["Consider intercepting and playing with the request payload."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html","x":false},{"n":"Admin Registration","c":"Improper Input Validation","d":3,"g":"Register as a user with administrator privileges.","t":[],"h":["You have to assign the unassignable.","Register as an ordinary user to learn what API endpoints are involved in this use case.","Think of the simplest possible implementations of a distinction between regular users and administrators."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html","x":false},{"n":"Deluxe Fraud","c":"Improper Input Validation","d":3,"g":"Obtain a Deluxe Membership without paying for it.","t":[],"h":["Look closely at what happens when you attempt to upgrade your account.","Go to the payment page for a deluxe membership and try paying through different methods.","Try inspecting the requests that go out for each of these methods, using the browser’s developer tools.","Maybe playing around with the parameters in these requests could reveal something interesting."],"m":"","x":false},{"n":"Mint the Honey Pot","c":"Improper Input Validation","d":3,"g":"Mint the Honey Pot NFT by gathering BEEs from the bee haven.","t":["Web3"],"h":["Discover NFT wonders among the captivating visual memories."],"m":"","x":false},{"n":"Payback Time","c":"Improper Input Validation","d":3,"g":"Place an order that makes you rich.","t":[],"h":["You literally need to make the shop owe you any amount of money.","Investigate the shopping basket closely to understand how it prevents you from creating orders that would fulfil the challenge."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html","x":false},{"n":"Upload Size","c":"Improper Input Validation","d":3,"g":"Upload a file larger than 100 kB.","t":[],"h":["You can attach a small file to the \"Complaint\" form. Investigate how this upload actually works.","First you should try to understand how the file upload is actually handled on the client and server side.","With this understanding you need to find a \"weak spot\" in the right place and have to craft an exploit for it."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html","x":false},{"n":"Upload Type","c":"Improper Input Validation","d":3,"g":"Upload a file that has no .pdf or .zip extension.","t":[],"h":["You can attach a PDF or ZIP file to the \"Complaint\" form. Investigate how this upload actually works.","If you solved the \"Upload a file larger than 100 kB\" challenge, you should try to apply the same solution here"],"m":"https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html","x":false},{"n":"Expired Coupon","c":"Improper Input Validation","d":4,"g":"Successfully redeem an expired campaign coupon code.","t":[],"h":["Try to identify past special event or holiday campaigns of the shop first.","Look for clues about the past campaign or holiday event somewhere in the application.","Solving this challenge does not require actual time traveling."],"m":"","x":false},{"n":"Poison Null Byte","c":"Improper Input Validation","d":4,"g":"Bypass a security control with a <a href=\"https://hakipedia.com/index.php/Poison_Null_Byte\">Poison Null Byte<\/a> to access a file not meant for your eyes.","t":["Prerequisite"],"h":["Analyze and tamper with links in the application until you get to an unprotected directory listing.","Some files in there are not directly accessible because a security mechanism prevents access.","The Poison Null Byte can trick the security mechanism in ":["Finding out who Morty actually is, will help to reduce the solution space.","You can assume that Morty answered his security question truthfully but employed some obfuscation to make it more secure.","Morty’s answer is less than 10 characters long and does not include any special characters.","Unfortunately, Forgot your password? is protected by a rate limiting mechanism that prevents brute forcing. You need to beat this somehow."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Forgot_Password_Cheat_Sheet.html","x":false},{"n":"Multiple Likes","c":"Broken Anti Automation","d":6,"g":"Like any review at least three times as the same user.","t":[],"h":["Punctuality is the politeness of kings.","Every user is (almost) immediately associated with the review they \"liked\" to prevent abuse of that functionality.","Did you really think clicking the \"like\" button three times in a row really fast would be enough to solve a ⭐⭐⭐⭐⭐⭐ challenge?","The underlying flaw of this challenge is a Race Condition."],"m":"","x":false},{"n":"Privacy Policy Inspection","c":"Security through Obscurity","d":3,"g":"Prove that you actually read our privacy policy.","t":["Shenanigans","Good for Demos"],"h":["Only by visiting a special URL you can confirm that you read it carefully.","First you should obviously solve the \"Read our privacy policy\" challenge.","It is fine to use the mouse cursor to not lose sight of the paragraph you are currently reading.","If you find some particularly hot sections in the policy you might want to melt them together similar to what you might have already uncovered in Apply some advanced cryptanalysis to find the real easter egg."],"m":"","x":false},{"n":"Steganography","c":"Security through Obscurity","d":4,"g":"<a href=\"/#/contact\">Rat out<\/a> a notorious character hiding in plain sight in the shop. (Mention the exact name of the character)","t":["Shenanigans"],"h":["There is not the slightest chance that you can spot the hidden character with the naked eye.","You will need very specialized tool assistance for this challenge.","The effective difficulty of this challenge depends a lot on what tools you pick to tackle it.","This challenge cannot be solved by just reading our \"Lorem Ipsum\"-texts carefully."],"m":"","x":false},{"n":"Blockchain Hype","c":"Security through Obscurity","d":5,"g":"Learn about the Token Sale before its official announcement.","t":["Contraption","Code Analysis","Web3"],"h":["The developers truly believe in \"Security through Obscurity\" over actual access restrictions.","Guessing or brute forcing the URL of the token sale page is very unlikely to succeed.","You should closely investigate the place where all paths within the application are defined.","Beating the employed obfuscation mechanism manually will take some time. Maybe there is an easier way to undo it?"],"m":"","x":false},{"n":"Outdated Allowlist","c":"Unvalidated Redirects","d":1,"g":"Let us redirect you to one of our crypto currency addresses which are not promoted any longer.","t":["Code Analysis"],"h":["When removing references to those addresses from the code the developers have been a bit sloppy.","More particular, they have been sloppy in a way that even the Angular Compiler was not able to clean up after them automatically.","It is of course not sufficient to just visit any of the crypto currency links directly to solve the challenge."],"m":"https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html","x":false},{"n":"Allowlist Bypass","c":"Unvalidated Redirects","d":4,"g":"Enforce a redirect to a page you are not supposed to redirect to.","t":["Prerequisite"],"h":["You have to find a way to beat the allowlist of allowed redirect URLs.","You can find several places where redirects happen in the OWASP Juice Shop.","The application will only allow you to redirect to allowlisted (previously referred to as whitelisted) URLs.","Tampering with the redirect mechanism might give you som const CAT_ORDER=["Injection", "Broken Authentication", "Broken Access Control", "Sensitive Data Exposure", "XSS", "XXE", "Cryptographic Issues", "Insecure Deserialization", "Vulnerable Components", "Security Misconfiguration", "Improper Input Validation", "Broken Anti Automation", "Security through Obscurity", "Unvalidated Redirects", "Observability Failures", "Miscellaneous"];

/* normalize + stable ids */
const CHALLENGES=CH.map((c,i)=>({id:"c"+i,name:c.n,cat:c.c,diff:c.d,goal:c.g,tags:c.t||[],hints:c.h||[],mit:c.m,danger:c.x}));

/* tag badge class map */
const TAGCLS={"Danger Zone":"danger","Prerequisite":"prereq","Brute Force":"brute","Tutorial":"tut","Code Analysis":"code"};
const SHOW_BADGE=new Set(["Danger Zone","Prerequisite","Brute Force","Tutorial","Code Analysis","OSINT","AI/LLM","Web3"]);

const KEY="juiceshop:state";
const storage=(typeof window!=="undefined"&&window.storage)?window.storage:{
  get:async k=>({value:localStorage.getItem(k)}),
  set:async(k,v)=>{localStorage.setItem(k,v);},
  delete:async k=>{localStorage.removeItem(k);}
};
const NAME2ID=new Map();CHALLENGES.forEach(c=>NAME2ID.set(c.name.toLowerCase(),c.id));
let LIVE={url:"",timer:null,ids:new Set(),status:"idle"};
function isBlocked(){return typeof location!=="undefined"&&location.protocol==="https:";}
async function syncOnce(url){
  let matched=0;
  try{
    const r=await fetch(url.replace(/\/+$/,"")+"/api/Challenges",{cache:"no-store"});
    if(!r.ok)return{matched:0,error:"HTTP "+r.status};
    const j=await r.json();const data=(j&&j.data)||[];
    let changed=false;
    data.forEach(row=>{
      if(!row||row.solved!==true)return;
      const id=NAME2ID.get(String(row.name||"").toLowerCase());
      if(id&&!STATE.solved[id]){STATE.solved[id]=true;LIVE.ids.add(id);changed=true;}
      if(id)matched++;
    });
    if(changed){save();renderList();}
    return{matched,error:null};
  }catch(e){return{matched:0,error:(e&&e.message)||"fetch failed"};}
}
let STATE={solved:{},notes:{},tier:{}};
let FILTER={status:"all",cat:"",diff:"",tag:"",q:"",sort:"cat"};
window.syncOnce=syncOnce;window.CHALLENGES=CHALLENGES;window.STATE=STATE;

async function load(){
  try{const r=await storage.get(KEY);if(r&&r.value)STATE=JSON.parse(r.value);}catch(e){}
  STATE.solved=STATE.solved||{};STATE.notes=STATE.notes||{};STATE.tier=STATE.tier||{};
}
let saveTimer=null;
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await storage.set(KEY,JSON.stringify(STATE));}catch(e){}},200);}

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const stars=n=>"\u2605".repeat(n);

function matches(ch){
  if(FILTER.cat&&ch.cat!==FILTER.cat)return false;
  if(FILTER.diff&&ch.diff!=FILTER.diff)return false;
  if(FILTER.tag&&!ch.tags.includes(FILTER.tag))return false;
  if(FILTER.q){const q=FILTER.q;if(!(ch.name.toLowerCase().includes(q)||(ch.goal||"").toLowerCase().includes(q)))return false;}
  const done=!!STATE.solved[ch.id];
  if(FILTER.status==="todo"&&done)return false;
  if(FILTER.status==="done"&&!done)return false;
  return true;
}

function renderList(){
  const list=$("#list");list.innerHTML="";
  const rows=CHALLENGES.filter(matches);
  if(!rows.length){list.appendChild(el("div","cat","// no challenges match filter"));updateStats();return;}
  const s=FILTER.sort;
  if(s==="cat"){
    const byCat={};rows.forEach(ch=>{(byCat[ch.cat]=byCat[ch.cat]||[]).push(ch);});
    const cats=CAT_ORDER.filter(c=>byCat[c]).concat(Object.keys(byCat).filter(c=>!CAT_ORDER.includes(c)));
    cats.forEach(cat=>{
      const arr=byCat[cat];const solved=arr.filter(c=>STATE.solved[c.id]).length;
      list.appendChild(el("div","cat",cat+" &middot; "+solved+"/"+arr.length));
      arr.forEach(ch=>list.appendChild(card(ch)));
    });
  }else{
    const arr=rows.slice();
    if(s==="diff")arr.sort((a,b)=>a.diff-b.diff||a.name.localeCompare(b.name));
    else if(s==="hard")arr.sort((a,b)=>b.diff-a.diff||a.name.localeCompare(b.name));
    else if(s==="todo")arr.sort((a,b)=>(STATE.solved[a.id]?1:0)-(STATE.solved[b.id]?1:0)||a.diff-b.diff);
    const label={diff:"EASIEST FIRST",hard:"HARDEST FIRST",todo:"UNSOLVED FIRST"}[s];
    const solved=arr.filter(c=>STATE.solved[c.id]).length;
    list.appendChild(el("div","cat",label+" &middot; "+solved+"/"+arr.length));
    arr.forEach(ch=>list.appendChild(card(ch)));
  }
  updateStats();
}

function card(ch){
  const done=!!STATE.solved[ch.id];
  const openTier=STATE.tier[ch.id]||0;
  const nh=ch.hints.length;
  const c=el("div","card"+(done?" done":""));
  const head=el("div","chead");
  const box=el("div","cbox",done?"\u2713":"");
  box.onclick=e=>{e.stopPropagation();STATE.solved[ch.id]=!done;save();renderList();};
  head.appendChild(box);
  head.appendChild(el("div","cname",ch.name));
  // badges
  const bwrap=el("div","badges");
  ch.tags.filter(t=>SHOW_BADGE.has(t)).forEach(t=>{bwrap.appendChild(el("span","bdg "+(TAGCLS[t]||""),t));});
  head.appendChild(bwrap);
  head.appendChild(el("div","stars",stars(ch.diff)));
  head.appendChild(el("div","caret","\u25B6"));
  head.onclick=()=>{c.classList.toggle("open");};
  c.appendChild(head);

  const body=el("div","cbody");
  if(ch.goal)body.appendChild(el("div","goal","GOAL &middot; "+ch.goal));

  // dynamic hint tiers
  if(nh>0){
    const tiers=el("div","tiers");
    for(let i=1;i<=nh;i++){
      const isLast=(i===nh);
      const b=el("div","tierbtn"+(isLast?" last":"")+(openTier>=i?" on":""),"HINT "+i);
      b.onclick=()=>{STATE.tier[ch.id]=(openTier>=i)?i-1:i;save();const nc=card(ch);c.replaceWith(nc);nc.classList.add("open");};
      tiers.appendChild(b);
    }
    body.appendChild(tiers);
    ch.hints.forEach((h,idx)=>{body.appendChild(el("div","reveal"+(openTier>=idx+1?" show":""),h));});
  }

  // book + fix links: show once deepest hint reached (or immediately if no hints)
  const unlocked=(nh===0)||(openTier>=nh);
  let links="stuck? official (last resort): "+
    '<a href="'+BOOK_PART2+'" target="_blank" rel="noopener">book hints \u2197</a>'+
    '<a href="'+BOOK_SOLUTIONS+'" target="_blank" rel="noopener">solution \u2197</a>';
  if(ch.mit)links+='<a class="fix" href="'+ch.mit+'" target="_blank" rel="noopener">the fix \u2197</a>';
  body.appendChild(el("div","booklinks"+(unlocked?" show":""),links));

  body.appendChild(el("div","lbl","NOTES"));
  const ta=el("textarea","notes");ta.value=STATE.notes[ch.id]||"";ta.placeholder="what worked, payload used, gotchas...";
  ta.oninput=()=>{STATE.notes[ch.id]=ta.value;save();};
  body.appendChild(ta);
  c.appendChild(body);
  return c;
}

function updateStats(){
  const total=CHALLENGES.length;
  const done=CHALLENGES.filter(c=>STATE.solved[c.id]).length;
  $("#scount").textContent=done;$("#tcount").textContent=total;
  const pct=total?Math.round(done/total*100):0;
  $("#pct").textContent=pct+"%";$("#bar").style.width=pct+"%";
  const map={};CHALLENGES.forEach(c=>{map[c.cat]=map[c.cat]||[0,0];map[c.cat][1]++;if(STATE.solved[c.id])map[c.cat][0]++;});
  const full=Object.values(map).filter(v=>v[0]===v[1]).length;
  $("#bycat").textContent="\u00b7 "+full+"/"+Object.keys(map).length+" categories cleared";
  const dz=CHALLENGES.filter(c=>c.danger);const dzDone=dz.filter(c=>STATE.solved[c.id]).length;
  $("#bydiff").textContent="\u00b7 danger zone "+dzDone+"/"+dz.length;
}

/* ---- ergonomics: click-to-copy + toast ---- */
let toastT=null;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1400);}
function copyWire(){
  document.body.addEventListener("click",e=>{
    const c=e.target.closest(".doc code, .goal code, .reveal code");
    if(!c||c.style.cursor==="default")return;
    const txt=c.textContent;
    const done=()=>{c.classList.add("copied");setTimeout(()=>c.classList.remove("copied"),600);toast("copied: "+(txt.length>44?txt.slice(0,44)+"\u2026":txt));};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));}
    else fallbackCopy(txt,done);
  });
}
function fallbackCopy(txt,cb){try{const ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();cb();}catch(e){}}

function collapsible(container){
  const kids=[...container.children];
  container.innerHTML="";
  let body=null;
  kids.forEach(node=>{
    if(node.tagName==="H3"){
      const sec=el("div","acc");
      const h=el("div","acc-h");
      h.appendChild(el("span","tg","\u25BC"));
      h.appendChild(node);
      h.appendChild(el("span","hint-inline","tap to fold"));
      body=el("div","acc-body");
      h.onclick=()=>sec.classList.toggle("closed");
      sec.appendChild(h);sec.appendChild(body);
      container.appendChild(sec);
    }else if(body){body.appendChild(node);}
    else{container.appendChild(node);}
  });
}

function wire(){
  document.querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
      ["challenges","method","toolkit","resources"].forEach(id=>{$("#"+id).classList.toggle("hidden",id!==t.dataset.tab);});
    };
  });
  $("#search").oninput=e=>{FILTER.q=e.target.value.toLowerCase();renderList();};
  $("#fcat").onchange=e=>{FILTER.cat=e.target.value;renderList();};
  $("#fdiff").onchange=e=>{FILTER.diff=e.target.value;renderList();};
  $("#ftag").onchange=e=>{FILTER.tag=e.target.value;renderList();};
  $("#fsort").onchange=e=>{FILTER.sort=e.target.value;renderList();};
  document.querySelectorAll(".chip:not(.start)").forEach(ch=>{ch.onclick=()=>{document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));ch.classList.add("on");FILTER.status=ch.dataset.f;renderList();};});
  // start-here on-ramp: guided Tutorial challenges, unsolved, easiest first
  $("#startchip").onclick=()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));$("#startchip").classList.add("on");
    FILTER.status="todo";FILTER.tag="Tutorial";FILTER.sort="diff";FILTER.cat="";FILTER.diff="";FILTER.q="";
    $("#ftag").value="Tutorial";$("#fsort").value="diff";$("#fcat").value="";$("#fdiff").value="";$("#search").value="";
    renderList();
  };
  $("#reset").onclick=async()=>{if(!confirm("wipe all progress, notes, and hint state?"))return;STATE={solved:{},notes:{},tier:{}};try{await storage.delete(KEY);}catch(e){}save();renderList();};
  $("#exportBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download="juiceworld-progress.json";document.body.appendChild(a);a.click();
    a.remove();URL.revokeObjectURL(url);toast("progress exported");
  };
  $("#importBtn").onclick=()=>$("#importFile").click();
  $("#importFile").onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const d=JSON.parse(rd.result);
        if(!d||typeof d!=="object"||typeof d.solved!=="object")throw 0;
        if(!confirm("replace current progress with the imported file?")){e.target.value="";return;}
        STATE={solved:d.solved||{},notes:d.notes||{},tier:d.tier||{}};
        save();renderList();toast("progress imported");
      }catch(_){toast("invalid progress file");}
      e.target.value="";
    };
    rd.readAsText(f);
  };
  // populate category + tag selects from data
  const sc=$("#fcat");CAT_ORDER.forEach(c=>{if(CHALLENGES.some(x=>x.cat===c)){const o=el("option");o.value=c;o.textContent=c;sc.appendChild(o);}});
  const st=$("#ftag");[...new Set(CHALLENGES.flatMap(c=>c.tags))].sort().forEach(t=>{const o=el("option");o.value=t;o.textContent=t;st.appendChild(o);});
}

(async function(){
  await load();
  docs();
  ["#methoddoc","#toolkitdoc","#resourcesdoc"].forEach(sel=>collapsible($(sel)));
  copyWire();
  wire();
  renderList();
})();
